<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Làm nhiệm vụ hệ thống</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e1e2f, #2d2d44);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    cursor: pointer;
    user-select: none;
    overflow: hidden;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 10px;
  }
  #counter {
    font-size: 5rem;
    font-weight: bold;
    color: #ffcc00;
    transition: transform 0.1s;
  }
  #sub {
    font-size: 1.1rem;
    opacity: 0.7;
    margin-top: 10px;
  }
  #result {
    display: none;
    font-size: 1.8rem;
    max-width: 500px;
    line-height: 1.5;
  }
  .pop {
    transform: scale(1.3);
  }
  #restartBtn {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #ffcc00;
    cursor: pointer;
    display: none;
  }
  #shareText {
    display: none;
    margin-top: 15px;
    font-size: 1rem;
    color: #ffcc00;
    font-weight: bold;
  }
  #credit {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 0.85rem;
    opacity: 0.6;
    color: white;
  }
</style>
</head>
<body id="body">
  <div id="game">
    <h1>⚙️ Nhiệm vụ hệ thống: click đủ 100 lần ⚙️</h1>
    <div id="counter">0</div>
    <div id="sub">/ 100</div>
  </div>

  <div id="result">
    <p id="resultText"></p>
    <p id="shareText">Hãy chia sẻ cho bạn bè bạn để lãng phí thời gian nhé !</p>
    <button id="restartBtn" onclick="restart()">Làm lại lần nữa vì... rảnh 🤡</button>
  </div>

  <div id="credit">by @HDZ463</div>

<script>
  let count = 0;
  let startTime = null;
  const TARGET = 100;
  const counterEl = document.getElementById('counter');
  const gameEl = document.getElementById('game');
  const resultEl = document.getElementById('result');
  const resultTextEl = document.getElementById('resultText');
  const restartBtn = document.getElementById('restartBtn');
  const body = document.getElementById('body');

  function handleClick(e) {
    if (e.target === restartBtn) return;
    if (count === 0) startTime = performance.now();
    if (count >= TARGET) return;

    count++;
    counterEl.textContent = count;
    counterEl.classList.add('pop');
    setTimeout(() => counterEl.classList.remove('pop'), 100);

    if (count >= TARGET) {
      const seconds = ((performance.now() - startTime) / 1000).toFixed(2);
      gameEl.style.display = 'none';
      resultTextEl.textContent =
        `🎉 Chúc mừng! Bạn vừa tốn ${seconds} giây trong đời để click ${TARGET} lần vào một cái nút chẳng để làm gì cả. Hy vọng nó đáng giá 😌`;
      resultEl.style.display = 'block';
      document.getElementById('shareText').style.display = 'block';
      restartBtn.style.display = 'inline-block';
    }
  }

  function restart() {
    count = 0;
    startTime = null;
    counterEl.textContent = 0;
    gameEl.style.display = 'block';
    resultEl.style.display = 'none';
    document.getElementById('shareText').style.display = 'none';
    restartBtn.style.display = 'none';
  }

  body.addEventListener('click', handleClick);
</script>
</body>
</html>
